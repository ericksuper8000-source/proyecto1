name: Validación Simple CI

# Define cuándo se ejecuta el pipeline
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Define los trabajos (jobs) del pipeline
jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Instalar dependencias (solo si existe requirements.txt)
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # 4. Ejecutar pruebas (solo si existe la carpeta tests)
      - name: Ejecutar pruebas
        run: |
          if [ -d tests ]; then
            pip install pytest
            pytest
          else
            echo "No se encontraron pruebas. Validación completada."
          fi
