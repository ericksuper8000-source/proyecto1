name: Python Code Check (Develop to Master)

on:
  pull_request:
    branches:
      - master
    # Esto asegura que el pipeline solo corra cuando el PR venga desde 'develop'
    # Si haces un PR desde otra rama que no sea develop, el pipeline también 
    # se activará por defecto, pero aquí lo restringimos al flujo principal.

jobs:
  python-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias de revisión
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Ejecutar revisión de sintaxis y estilo
      run: |
        # Primero revisamos errores críticos (E9, F63, F7, F82) que detendrán el proceso
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
        # Luego revisamos el estilo general. Si hay advertencias, no detendrá el merge 
        # (gracias al --exit-zero), pero te dará el reporte detallado.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
