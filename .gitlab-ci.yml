stages:
  - build
  - test

image: python:3.14

before_script:
  - python --version
  - pip install --upgrade pip

build_job:
  stage: build
  script:
    - echo "Ejecutando script..."
    - python Principal.py

test_job:
  stage: test
  script:
    - echo "Instalando pytest..."
    - pip install pytest
    - echo "Ejecutando tests..."
    - python -m pytest