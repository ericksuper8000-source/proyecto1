stages:
  - validar

validar:
  stage: validar
  image: python:3.11
  only:
    - master
    - merge_requests

  before_script:
    # Actualizar pip
    - python -m pip install --upgrade pip

  script:
    # 1. Instalar dependencias (solo si existe requirements.txt)
    - |
      if [ -f requirements.txt ]; then
        echo "Instalando dependencias..."
        pip install -r requirements.txt
      else
        echo "No se encontró requirements.txt. Continuando..."
      fi

    # 2. Ejecutar pruebas (solo si existe la carpeta tests)
    - |
      if [ -d tests ]; then
        echo "Ejecutando pruebas..."
        pip install pytest
        pytest
      else
        echo "No se encontraron pruebas. Validación completada."
      fi