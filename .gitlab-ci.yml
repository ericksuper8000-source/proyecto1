stages:
  - lint
  - test
  - docker

lint:
  stage: lint
  image: python:3.11
  script:
    - pip install flake8 black
    - flake8 .
    - black --check .

test:
  stage: test
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - pytest

docker:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_TOKEN"
  script:
    - docker build -t erickdev8/mi-app:latest .
    - docker push erickdev8/mi-app:latest
  only:
    - develop
    - merge_requests