stages:
  - lint
  - test
  - run
  - docker

lint_job:
  stage: lint
  image: python:3.11

  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

  before_script:
    - python -m pip install --upgrade pip
    - pip install flake8 black

  script:
    - flake8 .
    - black --check .

test_job:
  stage: test
  image: python:3.11

  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt

  script:
    - pytest

run_app_job:
  stage: run
  image: python:3.11

  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

  before_script:
    - python -m pip install --upgrade pip

  script:
    - python Principal.py

docker_job:
  stage: docker
  image: docker:latest

  services:
    - docker:dind

  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""

  script:
    - docker build -t mi-app .
    - docker run mi-app