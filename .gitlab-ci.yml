stages:
  - test

variables:
  PYTHON_VERSION: "3.11"

test_job:
  stage: test
  image: python:$PYTHON_VERSION

  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt

  script:
    - pytest